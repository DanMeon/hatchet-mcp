name: CI

# Triggers: PR / push to main — test + lint + typecheck. Wheel build/publish is in publish.yml.
# Docs/LICENSE/.gitignore-only changes are if-skipped via the changes job + job-level if
# (status: success). We avoid paths-ignore — it traps the required check "All tests passed"
# in an "expected" stuck state on GitHub.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # * Detect code changes — if only docs / LICENSE / .gitignore changed, if-skip the test job
  #   (status: success). code=false only when every changed file matches the exclude pattern.
  #   Missing base SHA / zero SHA falls back to code=true (= run everything) for safety.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: |
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ]; then
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # ^ three-dot diff = changes since the merge base (same as the PR diff)
          if git diff --name-only "$BASE_SHA"...HEAD \
              | grep -qvE '(^|/)([^/]+\.md|LICENSE[^/]*|\.gitignore)$|^docs/'; then
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # * Tests (all Python versions) + lint / format / typecheck (only on 3.10 — lint flag)
  test:
    name: Test (py${{ matrix.python }})
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { python: "3.10", lint: true }
          - { python: "3.11" }
          - { python: "3.12" }
          - { python: "3.13" }
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python }}
      - run: uv sync
      - name: Lint (ruff check)
        if: matrix.lint
        run: uv run ruff check src tests
      - name: Format check (ruff format)
        if: matrix.lint
        run: uv run ruff format --check src tests
      - name: Type check (pyright)
        if: matrix.lint
        run: uv run pyright
      - name: Test
        run: uv run pytest -q

  all-tests-passed:
    name: All tests passed
    if: always()
    runs-on: ubuntu-latest
    needs: [changes, test]
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: test
